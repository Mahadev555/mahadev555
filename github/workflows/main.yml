name: Update README SVGs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil lxml

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: cache
          key: loc-cache-${{ github.run_id }}
          restore-keys: loc-cache-

      - name: Generate SVGs
        run: python today.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}

      - name: Commit updated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A light_mode.svg dark_mode.svg cache
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update profile stats"
          git pull --rebase --autostash origin ${{ github.ref_name }}
          git push
